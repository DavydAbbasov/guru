server:
  host: "0.0.0.0"
  port: 8081

database:
  host: "localhost"
  port: 5432
  user: "notification"
  # Override with CFG_DATABASE_PASS env var — viper does not expand ${...}.
  pass: ""
  name: "notification"

kafka:
  brokers:
    - "localhost:9092"
  topic: "products-events"
  groupId: "notification-service"

logger:
  level: "info"

tracer:
  disabled: true
  endpoint: "localhost:4318"
  serviceName: "notification"

metrics:
  namespace: "notification"
