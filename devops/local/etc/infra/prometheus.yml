global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: products
    static_configs:
      - targets: ["products:8080"]
    metrics_path: /metrics

  - job_name: notification
    static_configs:
      - targets: ["notification:8081"]
    metrics_path: /metrics

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
